# MoG interpolation config

# Run parameters (override per run)
keyframes: ???          # Required: path to keyframe directory
output: ???             # Required: output path (video file or frame directory)
prompt: ""
save_frames: false

# Model selection
model: mog

# MoG model paths
mog:
  ckpt_path: vendor/MoG-VFI/checkpoints/ani.ckpt
  config_path: vendor/MoG-VFI/configs/ani.yaml
  vfi_ckpt_dir: vendor/MoG-VFI/emavfi/ckpt/

# Inference settings
height: 320
width: 512
video_length: 16         # MoG generates 16 frames per pair (14 intermediate)
ddim_steps: 50
ddim_eta: 1.0
guidance_scale: 7.5
guidance_rescale: 0.7
frame_stride: 24
timestep_spacing: uniform_trailing
half_precision: true      # Set true for 8GB GPUs

# Output
target_fps: 24
output_format: png
seed: 42

# Hydra — disable automatic output directory
hydra:
  output_subdir: null
  run:
    dir: .
